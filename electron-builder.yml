appId: com.autocontroller.app
productName: Auto Controller
directories:
  output: release
files:
  - package.json
  - packages/main/dist/**/*
  - packages/preload/dist/**/*
  - packages/renderer/dist/**/*
  - module/**/*
  - modules/**/*
  - config/**/*
  - requirements.txt
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
