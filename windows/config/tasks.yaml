# ========================================
# 任务模块目录配置
# 配置从哪些目录加载任务模块
# ========================================

task_dirs:
  - "./external_tasks"          # 外部任务目录（默认）
  # - "D:/my-tasks"              # 绝对路径示例
  # - "../other-project/tasks"  # 其他项目路径示例

# ========================================
# 各任务模块独立配置
# 每个任务模块可以有自己的配置项
# ========================================

# ----------------------------------------------------------------
# 示例任务模块（开发调试用）
# ----------------------------------------------------------------
example_task:
  name: "示例外部任务"
  enabled: true
  # schedule: "0 * * * *"        # cron 表达式
  interval: 60                   # 每60分钟执行一次
  # 任务自定义配置
  demo_param: "示例参数"

hello_world:
  name: "Hello World 任务"
  enabled: true
  interval: 30

# ----------------------------------------------------------------
# 京东到家订单监控模块
# ----------------------------------------------------------------
jddj_orders:
  name: "京东到家订单监控"
  enabled: false
  interval: 10                   # 每10分钟检查
  # 账号配置（建议通过环境变量 JDDJ_USERNAME / JDDJ_PASSWORD 设置）
  username: ""
  password: ""
  # 浏览器设置
  headless: false                # 是否显示浏览器窗口
  # 监控配置
  target_status:
    - "待接单"
    - "待打印"

# ----------------------------------------------------------------
# 社媒周报采集模块
# ----------------------------------------------------------------
weekly_media:
  name: "社媒周报采集"
  enabled: false
  schedule: "0 4 * * 1"         # 每周一凌晨4点
  # 平台配置
  platforms:
    - xiaohongshu
    - douyin
  # 输出配置
  output_format: excel

# ----------------------------------------------------------------
# 门店点检模块
# ----------------------------------------------------------------
inspection:
  name: "门店点检"
  enabled: false
  schedule:
    - "0 10 * * *"              # 每天10点
    - "0 16 * * *"              # 每天16点
  # 模拟器配置
  emulator: "mumu"
  adb_port: "127.0.0.1:16448"
