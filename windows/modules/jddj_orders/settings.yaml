# 京东到家订单模块配置定义
fields:
  - key: username
    label: 用户名
    type: text
    placeholder: "登录用户名"

  - key: password
    label: 密码
    type: password
    placeholder: "登录密码"

  - key: target_status
    label: 目标订单状态
    type: checkbox
    default: ["pending", "processing"]
    options:
      - value: "pending"
        label: "待处理"
      - value: "processing"
        label: "处理中"
      - value: "completed"
        label: "已完成"
      - value: "cancelled"
        label: "已取消"

  - key: notify_enabled
    label: 启用推送
    type: switch
    default: false

  - key: notify_type
    label: 推送方式
    type: select
    default: "wechat"
    options:
      - value: "wechat"
        label: "企业微信"
      - value: "email"
        label: "邮箱"

  - key: notify_target
    label: 推送目标
    type: text
    placeholder: "企业微信Webhook地址 或 目标邮箱"
