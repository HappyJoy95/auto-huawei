fields:
  - key: stores
    label: 门店列表
    type: object_list
    default: []
    fields:
      - key: name
        label: 门店名称
        type: text
        width: 320px
        placeholder: "如: 杭州萧山机场华为授权体验店"
      - key: code
        label: 门店代码
        type: text
        width: 130px
        placeholder: "如: SCN123456"
      - key: short_name
        label: 简称
        type: text
        width: 120px
        placeholder: "如: 萧山机场店"

  - key: notify_enabled
    label: 启用推送
    type: switch
    default: true

  - key: notify_type
    label: 推送方式
    type: checkbox
    default: ["wechat"]
    show_if: "notify_enabled"
    options:
      - value: "wechat"
        label: "企业微信"
      - value: "wechat_app"
        label: "企业微信应用"
      - value: "email"
        label: "邮箱"

  - key: notify_wechat_target
    label: 企业微信 Webhook
    type: text
    show_if: "notify_enabled"
    placeholder: "企业微信机器人 Webhook URL"

  - key: notify_wechat_app_target
    label: 企业微信接收人
    type: text
    show_if: "notify_enabled"
    placeholder: "接收人userid，多人用|分隔，如 zhangsan|lisi"

  - key: wechat_app_store_field
    label: 门店字段名
    type: text
    show_if: "notify_enabled"
    default: "store_names"
    placeholder: "结果数据中门店名的字段名，默认 store_names"

  - key: notify_email_target
    label: 邮箱接收人
    type: text
    show_if: "notify_enabled"
    placeholder: "接收通知的邮箱地址"
