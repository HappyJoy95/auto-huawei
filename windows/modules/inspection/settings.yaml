# 巡检模块配置定义
fields:
  - key: stores
    label: 门店列表
    type: object_list
    default: []
    fields:
      - key: name
        label: 门店名称
        type: text
        width: 320px
        placeholder: "如: 杭州萧山机场华为授权体验店"
      - key: code
        label: 门店代码
        type: text
        width: 130px
        placeholder: "如: SCN123456"
      - key: short_name
        label: 简称
        type: text
        width: 120px
        placeholder: "如: 萧山机场店"

  - key: notify_enabled
    label: 启用推送
    type: switch
    default: true

  - key: notify_type
    label: 推送方式
    type: select
    default: "wechat"
    show_if: "notify_enabled"
    options:
      - value: "wechat"
        label: "企业微信"
      - value: "email"
        label: "邮箱"

  - key: notify_target
    label: 推送目标
    type: text
    show_if: "notify_enabled"
    placeholder: "企业微信Webhook地址 或 目标邮箱"
