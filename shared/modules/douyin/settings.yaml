fields:
  - key: accounts
    label: 账号列表
    type: object_list
    default: []
    fields:
      - key: name
        label: 名称
        type: text
      - key: url
        label: 主页链接
        type: text

  - key: headless
    label: 无头模式
    type: switch
    default: true

  - key: notify_enabled
    label: 启用推送
    type: switch
    default: false

  - key: notify_type
    label: 推送方式
    type: checkbox
    default: ["email"]
    show_if: "notify_enabled"
    options:
      - value: "wechat"
        label: "企业微信"
      - value: "wechat_app"
        label: "企业微信应用"
      - value: "email"
        label: "邮箱"

  - key: notify_wechat_target
    label: 企业微信 Webhook
    type: text
    show_if: "notify_enabled"
    placeholder: "企业微信机器人 Webhook URL"

  - key: notify_wechat_app_target
    label: 企业微信接收人
    type: text
    show_if: "notify_enabled"
    placeholder: "接收人userid，多人用|分隔，如 zhangsan|lisi"


  - key: notify_email_target
    label: 邮箱接收人
    type: text
    show_if: "notify_enabled"
    placeholder: "接收通知的邮箱地址"
