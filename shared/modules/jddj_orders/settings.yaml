# 京东到家订单模块配置定义
fields:
  - key: username
    label: 用户名
    type: text
    placeholder: "登录用户名"

  - key: password
    label: 密码
    type: password
    placeholder: "登录密码"

  - key: status_options
    label: 订单状态选项
    type: object_list
    default:
      - label: "待接单"
        value: "待接单"
      - label: "待打印"
        value: "待打印"
    fields:
      - key: label
        label: 显示名称
        placeholder: "例如：待接单"
        width: 160
      - key: value
        label: 状态值
        placeholder: "订单中的实际状态文本"
        width: 180

  - key: target_status
    label: 目标订单状态
    type: checkbox
    default: ["待接单", "待打印"]
    options_from: status_options

  - key: headless
    label: 无头模式
    type: switch
    default: true

  - key: notify_enabled
    label: 启用推送
    type: switch
    default: false

  - key: notify_type
    label: 推送方式
    type: select
    default: "wechat"
    options:
      - value: "wechat"
        label: "企业微信"
      - value: "email"
        label: "邮箱"

  - key: notify_target
    label: 推送目标
    type: text
    placeholder: "企业微信Webhook地址 或 目标邮箱"
