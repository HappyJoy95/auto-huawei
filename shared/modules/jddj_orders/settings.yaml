# 京东到家订单模块配置定义
fields:
  - key: username
    label: 用户名
    type: text
    placeholder: "登录用户名"
    env_key: JDDJ_USERNAME

  - key: password
    label: 密码
    type: password
    placeholder: "登录密码"
    env_key: JDDJ_PASSWORD

  - key: status_options
    label: 订单状态选项
    type: object_list
    default:
      - label: "待接单"
        value: "待接单"
      - label: "待打印"
        value: "待打印"
    fields:
      - key: label
        label: 显示名称
        placeholder: "例如：待接单"
        width: 160
      - key: value
        label: 状态值
        placeholder: "订单中的实际状态文本"
        width: 180

  - key: target_status
    label: 目标订单状态
    type: checkbox
    default: ["待接单", "待打印"]
    options_from: status_options

  - key: headless
    label: 无头模式
    type: switch
    default: true

  - key: notify_enabled
    label: 启用推送
    type: switch
    default: false

  - key: notify_type
    label: 推送方式
    type: checkbox
    default: ["wechat"]
    show_if: "notify_enabled"
    options:
      - value: "wechat"
        label: "企业微信"
      - value: "wechat_app"
        label: "企业微信应用"
      - value: "email"
        label: "邮箱"

  - key: notify_wechat_target
    label: 企业微信 Webhook
    type: text
    show_if: "notify_enabled"
    placeholder: "企业微信机器人 Webhook URL"

  - key: notify_wechat_app_target
    label: 企业微信接收人
    type: text
    show_if: "notify_enabled"
    placeholder: "接收人userid，多人用|分隔，如 zhangsan|lisi"

  - key: notify_sync_enabled
    label: 同步推门店负责人
    type: switch
    default: false
    show_if: "notify_enabled"
    hint: "勾选后同时推送给全局配置的门店负责人（优先级1+2都推）"

  - key: notify_email_target
    label: 邮箱接收人
    type: text
    show_if: "notify_enabled"
    placeholder: "接收通知的邮箱地址"
